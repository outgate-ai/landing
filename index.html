<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Google Analytics/Ads disabled for dev -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Outgate.ai | AI Gateway & Guardrails Platform</title>
    <meta name="description" content="Enterprise AI gateway with built in guardrails. Route requests to any LLM provider, detect and anonymize sensitive data, enforce security policies. Deploy cloud or on premise. Free tier available." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://outgate.ai" />

    <!-- Open Graph -->
    <meta property="og:title" content="Outgate.ai | AI Gateway & Guardrails Platform" />
    <meta property="og:description" content="Route AI requests securely through a single gateway. Built in PII detection, content filtering, and policy enforcement for any LLM provider." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://outgate.ai" />
    <meta property="og:site_name" content="Outgate.ai" />
    <meta property="og:image" content="https://outgate.ai/images/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Outgate.ai | AI Gateway & Guardrails Platform" />
    <meta name="twitter:description" content="Enterprise AI gateway with guardrails. PII detection, content filtering, multi provider routing." />
    <meta name="twitter:image" content="https://outgate.ai/images/og-image.png" />

    <!-- Structured Data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Outgate.ai",
      "url": "https://outgate.ai",
      "description": "AI gateway and guardrails platform for secure LLM routing with PII detection, content filtering, and policy enforcement."
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Outgate.ai",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Cloud, On Premise",
      "description": "AI gateway and guardrails platform for secure LLM routing with PII detection, content filtering, and policy enforcement.",
      "url": "https://outgate.ai",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Outgate.ai",
      "legalName": "Gatewise UG (haftungsbeschr\u00e4nkt)",
      "url": "https://outgate.ai",
      "logo": "https://outgate.ai/images/og-image.png",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Beuthstr. 2",
        "addressLocality": "Berlin",
        "postalCode": "10117",
        "addressCountry": "DE"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: SiteNavigationElement (helps Google identify nav structure) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Features",
          "description": "AI gateway features including PII detection, content filtering, and multi-provider routing",
          "url": "https://outgate.ai/#features"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "Pricing",
          "description": "Free, Plus, and Pro plans for AI gateway and guardrails",
          "url": "https://outgate.ai/#pricing"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Documentation",
          "description": "Getting started guides and API reference for Outgate.ai",
          "url": "https://console.outgate.ai/docs"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "Console",
          "description": "Outgate.ai management console for AI gateway configuration",
          "url": "https://console.outgate.ai"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 5,
          "name": "Support",
          "description": "Contact Outgate.ai support team",
          "url": "https://console.outgate.ai/support"
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
