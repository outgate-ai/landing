name: Deploy Landing

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev' }}
    env:
      IS_PROD: ${{ startsWith(github.ref, 'refs/tags/v') }}
      TF_DIR: ${{ startsWith(github.ref, 'refs/tags/v') && 'terraform/environments/prod' || 'terraform/environments/dev' }}
      LANDING_DOMAIN: ${{ startsWith(github.ref, 'refs/tags/v') && 'outgate.ai' || 'dev.outgate.ai' }}
      CONSOLE_URL: ${{ startsWith(github.ref, 'refs/tags/v') && 'https://console.outgate.ai' || 'https://console.dev.outgate.ai' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          echo "s3_bucket=$(terraform output -raw s3_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CONSOLE_URL: ${{ env.CONSOLE_URL }}
          VITE_APP_NAME: outgate.ai

      - name: Prerender for bots
        run: npm run prerender

      - name: Inject environment markers
        shell: python3 {0}
        run: |
          import pathlib
          html = pathlib.Path('dist/index.html').read_text()
          is_prod = '${{ env.IS_PROD }}' == 'true'

          if is_prod:
              html = html.replace('<!-- __ROBOTS_META__ -->', '<meta name="robots" content="index, follow" />')
              ga = '''<script async src="https://www.googletagmanager.com/gtag/js?id=G-3XTL1T794G"></script>
              <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-3XTL1T794G");gtag("config","AW-18043717357");</script>'''
              html = html.replace('<!-- __GA_SNIPPET__ -->', ga)
          else:
              html = html.replace('<!-- __ROBOTS_META__ -->', '<meta name="robots" content="noindex, nofollow" />')
              html = html.replace('<!-- __GA_SNIPPET__ -->', '')
              pathlib.Path('dist/robots.txt').write_text('User-agent: *\nDisallow: /\n')

          pathlib.Path('dist/index.html').write_text(html)
          assert '__ROBOTS_META__' not in html, 'ROBOTS placeholder not replaced!'
          print(f"Injected {'prod' if is_prod else 'dev'} markers")

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${{ steps.tf.outputs.s3_bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"

      - name: Summary
        run: |
          ENV_LABEL=${{ env.IS_PROD == 'true' && 'prod' || 'dev' }}
          echo "## Deployment Complete (${ENV_LABEL})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** https://${{ env.LANDING_DOMAIN }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**CloudFront:** \`${{ steps.tf.outputs.cloudfront_domain }}\`" >> "$GITHUB_STEP_SUMMARY"
